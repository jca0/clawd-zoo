<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="96" height="96" shape-rendering="crispEdges">
  <!-- Head/body (wide rectangle) -->
  <rect x="4" y="6" width="16" height="10" fill="#CF8060"/>
  <!-- Arms (small nubs on sides) -->
  <rect x="1" y="9" width="3" height="3" fill="#CF8060"/>
  <rect x="20" y="9" width="3" height="3" fill="#CF8060"/>
  <!-- Eyes -->
  <rect x="8" y="9" width="2" height="2" fill="#2A2A2A"/>
  <rect x="14" y="9" width="2" height="2" fill="#2A2A2A"/>
  <!-- Legs (4 prongs, symmetrical) -->
  <rect x="5" y="16" width="2" height="4" fill="#CF8060"/>
  <rect x="9" y="16" width="2" height="4" fill="#CF8060"/>
  <rect x="13" y="16" width="2" height="4" fill="#CF8060"/>
  <rect x="17" y="16" width="2" height="4" fill="#CF8060"/>
</svg>
